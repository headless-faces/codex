<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Combat Codex</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #171410;
      color: #f3e9d2;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      padding: 2rem;
    }
    h1 { font-size: clamp(2rem, 6vw, 3.5rem); letter-spacing: 0.04em; }
    .cards { display: flex; flex-wrap: wrap; gap: 1.5rem; justify-content: center; }
    a.card {
      display: block;
      padding: 1.5rem 2.5rem;
      border-radius: 16px;
      text-decoration: none;
      font-size: 1.4rem;
      font-weight: 700;
      color: #171410;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    }
    a.card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
    .hank { background: #e7b53c; }
    .jossiah { background: #e0463a; color: #fff; }
  </style>
</head>
<body>
  <h1>Combat Codex</h1>
  <div class="cards">
    <a class="card hank" href="./Hank/">Hank</a>
    <a class="card jossiah" href="./Jossiah/">Jossiah the Red</a>
  </div>
</body>
</html>
