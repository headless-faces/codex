  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

 opacity: 0.06; mix-blend-mode: multiply;\n  }\n  body::after {\n    content: \"\"; position: fixed; inset: 0; z-index: 0; pointer-events: none;\n    box-shadow: inset 0 0 220px oklch(0.45 0.06 50 / 0.28);\n  }\n\n  .wrap {\n    position: relative; z-index: 1;\n    max-width: 820px; margin: 0 auto;\n    padding: clamp(24px, 4vw, 44px) clamp(18px, 5vw, 48px) 88px;\n  }\n\n  /* ---------- Top bar ---------- */\n  .back {\n    display: inline-flex; align-items: center; gap: 9px;\n    font-family: \"Spline Sans Mono\", monospace; font-size: 12px; font-weight: 500;\n    letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-mute);\n    text-decoration: none; margin: 6px 0 clamp(26px, 5vw, 44px);\n    transition: color .2s, gap .2s;\n  }\n  .back:hover { color: var(--oxblood); gap: 13px; }\n  .back svg { width: 14px; height: 14px; }\n\n  /* ---------- Masthead ---------- */\n  .mast { position: relative; margin-bottom: 26px; }\n  .mast__eyebrow {\n    font-family: \"Spline Sans Mono\", monospace; font-size: 11.5px; font-weight: 500;\n    letter-spacing: 0.34em; text-transform: uppercase; color: var(--storm);\n    margin: 0 0 10px;\n  }\n  .mast__name {\n    font-family: \"Cormorant Garamond\", serif; font-weight: 700;\n    font-size: clamp(58px, 13vw, 124px); line-height: 0.86;\n    letter-spacing: 0.01em; margin: 0; color: var(--ink);\n    position: relative;\n  }\n  .mast__bolt {\n    position: absolute; right: -6px; top: 50%; transform: translateY(-52%);\n    width: clamp(70px, 16vw, 150px); height: auto; color: var(--storm);\n    opacity: 0.13; z-index: -1;\n  }\n  .mast__quote {\n    font-family: \"Cormorant Garamond\", serif; font-style: italic; font-weight: 500;\n    font-size: clamp(20px, 3.4vw, 27px); color: var(--oxblood);\n    margin: 16px 0 0; line-height: 1.3;\n  }\n  .mast__quote cite {\n    display: block; font-family: \"Spline Sans Mono\", monospace; font-style: normal;\n    font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase;\n    color: var(--ink-mute); margin-top: 8px;\n  }\n\n  /* ---------- Top rule ---------- */\n  .ribbon {\n    display: flex; align-items: center; gap: 12px; margin: 24px 0;\n    color: var(--oxblood);\n  }\n  .ribbon::before, .ribbon::after {\n    content: \"\"; height: 2px; flex: 1;\n    background: linear-gradient(90deg, transparent, var(--rule), var(--rule), transparent);\n  }\n  .ribbon .lozenge { width: 9px; height: 9px; background: var(--oxblood); transform: rotate(45deg); }\n\n  /* ---------- Vitals ---------- */\n  .vitals {\n    display: flex; flex-wrap: wrap; gap: 10px; margin: 0 0 22px;\n  }\n  .vital {\n    flex: 1 1 0; min-width: 130px;\n    border: 1px solid var(--hair); border-radius: 4px;\n    background: oklch(0.97 0.02 82 / 0.5);\n    padding: 13px 16px;\n    display: flex; flex-direction: column; gap: 3px;\n  }\n  .vital .k {\n    font-family: \"Spline Sans Mono\", monospace; font-size: 10.5px; font-weight: 500;\n    letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-mute);\n  }\n  .vital .v {\n    font-family: \"Cormorant Garamond\", serif; font-weight: 700;\n    font-size: 30px; line-height: 1; color: var(--oxblood);\n  }\n  .vital .v small { font-family: \"Spectral\", serif; font-weight: 500; font-size: 15px; color: var(--ink-soft); }\n\n  /* ---------- Ability scores ---------- */\n  .abilities {\n    display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; margin: 0 0 18px;\n  }\n  .abil {\n    text-align: center; border: 1px solid var(--hair); border-radius: 4px;\n    background: oklch(0.97 0.02 82 / 0.4); padding: 12px 6px 10px;\n  }\n  .abil .name {\n    font-family: \"Spline Sans Mono\", monospace; font-size: 11px; font-weight: 600;\n    letter-spacing: 0.14em; color: var(--storm); margin-bottom: 6px;\n  }\n  .abil .score { font-family: \"Cormorant Garamond\", serif; font-weight: 700; font-size: 27px; line-height: 1; color: var(--ink); }\n  .abil .mod {\n    font-family: \"Spline Sans Mono\", monospace; font-size: 12px; color: var(--ink-soft);\n    margin-top: 3px;\n  }\n  .skills {\n    font-size: 15px; color: var(--ink-soft); margin: 0 0 4px;\n    padding: 11px 16px; border-left: 2px solid var(--storm);\n    background: oklch(0.5 0.07 192 / 0.07);\n  }\n  .skills strong { color: var(--ink); font-weight: 600; }\n\n  /* ---------- Sections ---------- */\n  .block { margin-top: 30px; }\n  .block__head {\n    font-family: \"Cormorant Garamond\", serif; font-weight: 600;\n    font-size: 26px; letter-spacing: 0.02em; color: var(--oxblood);\n    margin: 0 0 4px; display: flex; align-items: center; gap: 14px;\n  }\n  .block__head::after { content: \"\"; flex: 1; height: 2px; background: linear-gradient(90deg, var(--rule), transparent); }\n\n  .entry { padding: 16px 0; border-bottom: 1px solid var(--hair); }\n  .entry:last-child { border-bottom: 0; }\n  .entry__top {\n    display: flex; align-items: baseline; flex-wrap: wrap; gap: 6px 10px; margin-bottom: 8px;\n  }\n  .entry__name {\n    font-family: \"Cormorant Garamond\", serif; font-weight: 700;\n    font-size: 22px; line-height: 1.15; color: var(--ink); margin: 0;\n    flex: 0 0 auto;\n  }\n  .entry__kind {\n    font-family: \"Spline Sans Mono\", monospace; font-size: 10.5px; font-weight: 500;\n    letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-mute);\n  }\n  .recharge {\n    margin-left: auto;\n    font-family: \"Spline Sans Mono\", monospace; font-size: 10px; font-weight: 500;\n    letter-spacing: 0.1em; text-transform: uppercase;\n    color: var(--storm-l); border: 1px solid oklch(0.5 0.07 192 / 0.45);\n    border-radius: 999px; padding: 4px 10px; white-space: nowrap;\n  }\n  .recharge[data-rest=\"at-will\"] { color: var(--gild); border-color: oklch(0.6 0.09 70 / 0.45); }\n  .entry__text { font-size: 16px; line-height: 1.6; color: var(--ink-soft); margin: 0; }\n  .entry__text strong { color: var(--ink); font-weight: 600; }\n  .entry__stat {\n    font-family: \"Spline Sans Mono\", monospace; font-size: 13px; color: var(--oxblood);\n    background: oklch(0.5 0.12 25 / 0.07); padding: 1px 6px; border-radius: 3px;\n  }\n\n  footer {\n    text-align: center; margin-top: 46px;\n    font-family: \"Spline Sans Mono\", monospace; font-size: 11px;\n    letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-mute);\n  }\n\n  @media (max-width: 540px) {\n    .abilities { grid-template-columns: repeat(3, 1fr); }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n  <div class=\"wrap\">\n    <a class=\"back\" href=\"../../\">\n      <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M19 12H5M11 6l-6 6 6 6\"><\u002Fpath><\u002Fsvg>\n      The Nameless Lords\n    <\u002Fa>\n\n    <header class=\"mast\">\n      <p class=\"mast__eyebrow\">Retainer · Brute<\u002Fp>\n      <h1 class=\"mast__name\">Clack\n        <svg class=\"mast__bolt\" viewBox=\"0 0 200 200\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"18\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\"><path d=\"M86 40 L40 100 L86 160 M40 100 L150 100\"><\u002Fpath><\u002Fsvg>\n      <\u002Fh1>\n      <p class=\"mast__quote\">One claw to crush, one to carve — nothing wasted.<\u002Fp>\n    <\u002Fheader>\n\n    <div class=\"ribbon\"><span class=\"lozenge\"><\u002Fspan><\u002Fdiv>\n\n    <!-- Vitals -->\n    <div class=\"vitals\">\n      <div class=\"vital\"><span class=\"k\">Armor Class<\u002Fspan><span class=\"v\">16<\u002Fspan><\u002Fdiv>\n      <div class=\"vital\"><span class=\"k\">Hit Points<\u002Fspan><span class=\"v\">45<\u002Fspan><\u002Fdiv>\n      <div class=\"vital\"><span class=\"k\">Speed<\u002Fspan><span class=\"v\">30<small> ft<\u002Fsmall><\u002Fspan><\u002Fdiv>\n      <div class=\"vital\"><span class=\"k\">Grapple DC<\u002Fspan><span class=\"v\">15<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Ability scores -->\n    <div class=\"abilities\">\n      <div class=\"abil\"><div class=\"name\">STR<\u002Fdiv><div class=\"score\">18<\u002Fdiv><div class=\"mod\">+4<\u002Fdiv><\u002Fdiv>\n      <div class=\"abil\"><div class=\"name\">DEX<\u002Fdiv><div class=\"score\">10<\u002Fdiv><div class=\"mod\">+0<\u002Fdiv><\u002Fdiv>\n      <div class=\"abil\"><div class=\"name\">CON<\u002Fdiv><div class=\"score\">16<\u002Fdiv><div class=\"mod\">+3<\u002Fdiv><\u002Fdiv>\n      <div class=\"abil\"><div class=\"name\">INT<\u002Fdiv><div class=\"score\">8<\u002Fdiv><div class=\"mod\">−1<\u002Fdiv><\u002Fdiv>\n      <div class=\"abil\"><div class=\"name\">WIS<\u002Fdiv><div class=\"score\">18<\u002Fdiv><div class=\"mod\">+4<\u002Fdiv><\u002Fdiv>\n      <div class=\"abil\"><div class=\"name\">CHA<\u002Fdiv><div class=\"score\">8<\u002Fdiv><div class=\"mod\">−1<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <p class=\"skills\"><strong>Skills<\u002Fstrong> &nbsp;Survival +8<\u002Fp>\n\n    <!-- Combat -->\n    <section class=\"block\">\n      <h2 class=\"block__head\">Combat<\u002Fh2>\n\n      <div class=\"entry\">\n        <div class=\"entry__top\">\n          <h3 class=\"entry__name\">Crushing Claws<\u002Fh3>\n          <span class=\"entry__kind\">Melee Weapon Attack<\u002Fspan>\n          <span class=\"recharge\" data-rest=\"at-will\">At Will<\u002Fspan>\n        <\u002Fdiv>\n        <p class=\"entry__text\"><span class=\"entry__stat\">+8 to hit<\u002Fspan>, reach 5 ft., one target Large or smaller. <strong>Hit:<\u002Fstrong> 2d6 + 4 bludgeoning damage, and the target is <strong>grappled (escape DC 15)<\u002Fstrong>. Clack can hold one creature in each claw.<\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"entry\">\n        <div class=\"entry__top\">\n          <h3 class=\"entry__name\">Limb Chop<\u002Fh3>\n          <span class=\"entry__kind\">Start of Turn · vs. Grappled<\u002Fspan>\n          <span class=\"recharge\" data-rest=\"at-will\">At Will<\u002Fspan>\n        <\u002Fdiv>\n        <p class=\"entry__text\">A creature grappled by Clack must succeed on a <span class=\"entry__stat\">CON DC 15<\u002Fspan> save or he shears through a limb for <strong>3d8 + 4 slashing damage<\u002Fstrong> and the creature <strong>loses one limb<\u002Fstrong> (DM's choice): a lost arm drops what it held and disables that hand; a lost leg drops its speed to 0 and knocks it prone. On a success, half damage and the limb is kept.<\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"entry\">\n        <div class=\"entry__top\">\n          <h3 class=\"entry__name\">Blinding Spew<\u002Fh3>\n          <span class=\"entry__kind\">Action · 15 ft.<\u002Fspan>\n          <span class=\"recharge\" data-rest=\"long\">Recharge 5–6<\u002Fspan>\n        <\u002Fdiv>\n        <p class=\"entry__text\">Clack spits a thick, stinging brine at one creature within 15 ft. The target must succeed on a <span class=\"entry__stat\">DEX DC 15<\u002Fspan> save or be <strong>blinded<\u002Fstrong>. A blinded creature can use its action to wipe its eyes clear, ending the effect.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- Out of Combat -->\n    <section class=\"block\">\n      <h2 class=\"block__head\">Out of Combat<\u002Fh2>\n\n      <div class=\"entry\">\n        <div class=\"entry__top\">\n          <h3 class=\"entry__name\">Crusher and Cutter<\u002Fh3>\n          <span class=\"entry__kind\">Field Butcher<\u002Fspan>\n        <\u002Fdiv>\n        <p class=\"entry__text\">One claw is a blunt, heavy crusher; the other a slender, fine-edged cutter. Together they make Clack a precise field-butcher, able to cleanly dissect a slain creature to harvest <strong>hide, scales, venom glands, organs, or other usable parts<\u002Fstrong> without spoiling them. He has <strong>Advantage on checks to dismantle, skin, or extract material<\u002Fstrong> from a corpse, and can recover crafting or alchemical components a careless blade would ruin.<\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"entry\">\n        <div class=\"entry__top\">\n          <h3 class=\"entry__name\">Molt<\u002Fh3>\n          <span class=\"entry__kind\">Action · Escape<\u002Fspan>\n          <span class=\"recharge\" data-rest=\"long\">1 / Week<\u002Fspan>\n        <\u002Fdiv>\n        <p class=\"entry__text\">Clack sheds his entire shell to escape anything bound to it — manacles, webbing, ensnaring roots, hardened tar, even a <strong>tracking sigil painted on his carapace<\u002Fstrong>. He emerges soft-shelled, and the new shell hardens within minutes. Until it sets, his <strong>AC is reduced<\u002Fstrong> and he has Disadvantage on saves against being knocked prone or shoved.<\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"entry\">\n        <div class=\"entry__top\">\n          <h3 class=\"entry__name\">Crushing Grip<\u002Fh3>\n          <span class=\"entry__kind\">Brute Force<\u002Fspan>\n        <\u002Fdiv>\n        <p class=\"entry__text\">Clack's crusher claw breaks what most tools cannot. Given a few moments of uninterrupted effort he can <strong>shatter a padlock, snap a chain, splinter a barred door, crack dense bone, or wreck a jammed mechanism<\u002Fstrong>. He has Advantage on Strength checks to break or force objects, and can hold a heavy load — a closing gate, a falling beam, a struggling captive — fixed in place without tiring.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <footer>Crusher and cutter · Nothing goes to waste<\u002Ffooter>\n  <\u002Fdiv>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
